<!-- LOGIN PAGE --> <!-- Página de Login do sistema -->
<div id="loginContainer" class="login-container active">
    <div class="login-bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="login-wrapper">
        <div class="login-logo">
            <div class="login-avatar-wrap">
                <img src="assets/images/lopes-logo-opt.png" alt="WolfSource - Gestão Financeira" class="profile-logo">
            </div>
            <h1>WolfSource</h1>
            <p class="login-tagline">Gestão Financeira</p>
        </div>
        
        <form id="loginForm" class="login-form">
            <div class="form-group input-float">
                <i class="fa-solid fa-user field-icon"></i>
                <input type="text" id="username" placeholder="Usuário" required autocomplete="username">
            </div>
            
            <div class="form-group input-float">
                <i class="fa-solid fa-lock field-icon"></i>
                <input type="password" id="password" placeholder="Senha" required autocomplete="current-password">
                <button type="button" id="togglePassword" class="toggle-password-btn" aria-label="Mostrar senha">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>
            
            <button type="submit" class="login-btn">
                <span>Entrar</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
            
            <div id="loginError" class="login-error"></div>
        </form>

        <button type="button" id="forgotPasswordBtn" class="forgot-password-link">
            <i class="fa-solid fa-key"></i> Esqueci minha senha
        </button>
        
        <div class="login-hint">
            <i class="fa-solid fa-circle-info"></i>
            <span>Utilize seu login e senha cadastrados</span>
        </div>
        <p class="login-dev-credit">Desenvolvido por <a href="https://luangs.pro/" target="_blank" rel="noopener noreferrer">Luan Gs</a></p>
    </div>
</div>

<!-- MODAL DE RECUPERAÇÃO DE SENHA -->
<div id="resetPasswordModal" class="reset-modal-overlay">
    <div class="reset-modal">
        <button class="reset-modal-close" id="resetModalClose"><i class="fa-solid fa-xmark"></i></button>
        <div class="reset-modal-icon"><i class="fa-solid fa-envelope-open-text"></i></div>
        <h2 class="reset-modal-title">Recuperar Senha</h2>

        <!-- Step 1: Email -->
        <div id="resetStep1" class="reset-step active">
            <p class="reset-modal-desc">Informe o e-mail vinculado à sua conta. Enviaremos um código de verificação.</p>
            <div class="reset-input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="resetEmail" placeholder="seu@email.com" required>
            </div>
            <button type="button" id="sendResetCode" class="reset-btn">
                <span>Enviar código</span>
                <i class="fa-solid fa-paper-plane"></i>
            </button>
            <div id="resetStep1Error" class="reset-error"></div>
        </div>

        <!-- Step 2: Code -->
        <div id="resetStep2" class="reset-step">
            <p class="reset-modal-desc">Digite o código de 6 dígitos enviado para <strong id="resetEmailDisplay"></strong></p>
            <div class="reset-code-inputs">
                <input type="text" maxlength="1" class="reset-code-digit" data-index="0" inputmode="numeric">
                <input type="text" maxlength="1" class="reset-code-digit" data-index="1" inputmode="numeric">
                <input type="text" maxlength="1" class="reset-code-digit" data-index="2" inputmode="numeric">
                <input type="text" maxlength="1" class="reset-code-digit" data-index="3" inputmode="numeric">
                <input type="text" maxlength="1" class="reset-code-digit" data-index="4" inputmode="numeric">
                <input type="text" maxlength="1" class="reset-code-digit" data-index="5" inputmode="numeric">
            </div>
            <button type="button" id="verifyResetCode" class="reset-btn">
                <span>Verificar código</span>
                <i class="fa-solid fa-shield-check"></i>
            </button>
            <button type="button" id="resendResetCode" class="reset-link-btn">Reenviar código</button>
            <div id="resetStep2Error" class="reset-error"></div>
        </div>

        <!-- Step 3: New Password -->
        <div id="resetStep3" class="reset-step">
            <p class="reset-modal-desc">Defina sua nova senha.</p>
            <div class="reset-input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="resetNewPassword" placeholder="Nova senha" required minlength="4">
            </div>
            <div class="reset-input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="resetConfirmPassword" placeholder="Confirmar nova senha" required minlength="4">
            </div>
            <button type="button" id="saveNewPassword" class="reset-btn">
                <span>Salvar nova senha</span>
                <i class="fa-solid fa-check"></i>
            </button>
            <div id="resetStep3Error" class="reset-error"></div>
        </div>
    </div>
</div>
