<!-- ====== DEBTS TAB ====== --> <!-- Aba de dívidas -->
<section id="debts" class="tab-content">
    <div class="page-header">
        <h2 class="page-title">Dívidas</h2>
        <button id="addDebtBtn" class="add-new-btn">
            <i class="fa-solid fa-plus"></i> Nova
        </button>
    </div>

    <!-- Debt Modal --> <!-- Modal para adicionar/editar dívida -->
    <div id="debtModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="debtModalTitle"><i class="fa-solid fa-credit-card"></i> Nova dívida</h3>
                <button class="close modal-close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="debtForm">
                <input type="hidden" id="editDebtId" value="">
                <div class="form-group" id="creditorTextGroup">
                    <label for="debtCreditor">Credor</label>
                    <input type="text" id="debtCreditor" placeholder="Nome do credor" required>
                </div>
                <div class="form-group" id="creditorFixedGroup" style="display:none">
                    <label for="debtFixedCreditor">Credor Fixo</label>
                    <select id="debtFixedCreditor">
                        <option value="Recrearte">Recrearte</option>
                        <option value="Enel">Enel (Luz)</option>
                        <option value="Perua Escolar">Perua Escolar</option>
                        <option value="Condomínio">Condomínio</option>
                        <option value="__outro__">Outro...</option>
                    </select>
                </div>
                <div class="form-group" id="creditorCardGroup" style="display:none">
                    <label for="debtCardIssuer">Banco / Cartão</label>
                    <select id="debtCardIssuer">
                        <option value="Nubank">Nubank</option>
                        <option value="Itaú">Itaú</option>
                        <option value="Porto Seguro">Porto Seguro</option>
                        <option value="Caixa">Caixa</option>
                        <option value="Mercado Pago">Mercado Pago</option>
                        <option value="Banco do Brasil">Banco do Brasil</option>
                        <option value="Santander">Santander</option>
                    </select>
                </div>
                <div class="form-group" id="creditorBankGroup" style="display:none">
                    <label for="debtBankIssuer">Banco</label>
                    <select id="debtBankIssuer">
                        <option value="Nubank">Nubank</option>
                        <option value="Itaú">Itaú</option>
                        <option value="Porto Seguro">Porto Seguro</option>
                        <option value="Caixa">Caixa</option>
                        <option value="Mercado Pago">Mercado Pago</option>
                        <option value="Banco do Brasil">Banco do Brasil</option>
                        <option value="Santander">Santander</option>
                    </select>
                </div>

                <!-- Tipo de dívida -->
                <div class="form-group">
                    <label>Tipo</label>
                    <div class="type-toggle-group debt-type-group">
                        <button type="button" class="type-toggle-btn active debt-type-toggle" data-value="unica">
                            <i class="fa-solid fa-receipt"></i> Única
                        </button>
                        <button type="button" class="type-toggle-btn debt-type-toggle" data-value="fixa">
                            <i class="fa-solid fa-rotate"></i> Fixa
                        </button>
                        <button type="button" class="type-toggle-btn debt-type-toggle" data-value="cartao">
                            <i class="fa-solid fa-credit-card"></i> Cartão
                        </button>
                        <button type="button" class="type-toggle-btn debt-type-toggle" data-value="emprestimo">
                            <i class="fa-solid fa-hand-holding-dollar"></i> Emprést.
                        </button>
                        <button type="button" class="type-toggle-btn debt-type-toggle" data-value="financiamento">
                            <i class="fa-solid fa-building-columns"></i> Financ.
                        </button>
                    </div>
                    <input type="hidden" id="debtType" value="unica">
                </div>

                <!-- Sub-opções do cartão -->
                <div id="cartaoOptions" class="form-group" style="display:none">
                    <label>Modalidade do cartão</label>
                    <div class="type-toggle-group cartao-mode-group">
                        <button type="button" class="type-toggle-btn active cartao-mode-toggle" data-value="unica">
                            <i class="fa-solid fa-receipt"></i> Única
                        </button>
                        <button type="button" class="type-toggle-btn cartao-mode-toggle" data-value="recorrente">
                            <i class="fa-solid fa-rotate"></i> Recorrente
                        </button>
                        <button type="button" class="type-toggle-btn cartao-mode-toggle" data-value="parcelado">
                            <i class="fa-solid fa-layer-group"></i> Parcelado
                        </button>
                    </div>
                    <input type="hidden" id="cartaoMode" value="unica">
                </div>

                <div class="form-group">
                    <label for="debtAmount" id="debtAmountLabel">Valor (R$)</label>
                    <input type="number" id="debtAmount" placeholder="0,00" step="0.01" required>
                </div>

                <!-- Campos de parcelamento (financiamento) -->
                <div id="installmentFields" style="display:none">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="debtInstallments">Nº Parcelas</label>
                            <input type="number" id="debtInstallments" placeholder="Ex: 48" min="2" step="1">
                        </div>
                        <div class="form-group">
                            <label for="debtInstallmentValue">Valor Parcela (R$)</label>
                            <input type="number" id="debtInstallmentValue" placeholder="0,00" step="0.01">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="debtPaidInstallments">Parcelas Pagas</label>
                            <input type="number" id="debtPaidInstallments" placeholder="0" min="0" step="1" value="0">
                        </div>
                        <div class="form-group">
                            <label for="debtRemainingValue">Restante (R$)</label>
                            <input type="number" id="debtRemainingValue" placeholder="0,00" step="0.01" readonly>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="debtDueDate">Vencimento</label>
                    <input type="date" id="debtDueDate" required>
                </div>
                <div class="form-group">
                    <label for="debtResponsible">Responsável</label>
                    <select id="debtResponsible" required>
                        <!-- Populado dinamicamente por JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="debtCategory">Categoria</label>
                    <select id="debtCategory">
                        <option value="">Selecione...</option>
                        <option value="alimentacao">🍽️ Alimentação</option>
                        <option value="transporte">🚗 Transporte</option>
                        <option value="saude">💊 Saúde</option>
                        <option value="educacao">📚 Educação</option>
                        <option value="moradia">🏠 Moradia</option>
                        <option value="lazer">🎮 Lazer</option>
                        <option value="utilidades">⚡ Utilidades</option>
                        <option value="beleza">💅 Beleza</option>
                        <option value="pets">🐾 Pets</option>
                        <option value="assinaturas">📺 Assinaturas</option>
                        <option value="investimentos">📈 Investimentos</option>
                        <option value="academia">🏋️ Academia</option>
                        <option value="outros">📁 Outros</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="debtDescription">Descrição</label>
                    <textarea id="debtDescription" placeholder="Descrição da dívida" rows="3"></textarea>
                </div>
                <button type="submit" class="btn-primary" id="debtSubmitBtn">
                    <i class="fa-solid fa-check"></i> Registrar
                </button>
            </form>
        </div>
    </div>

    <!-- Alertas de vencimento (sino) -->
    <div class="debt-alerts-wrap">
        <button id="debtAlertsBell" class="debt-bell-btn" style="display:none">
            <i class="fa-solid fa-bell"></i>
            <span class="debt-bell-badge" id="debtAlertsBadge">0</span>
        </button>
        <div id="debtAlertsDropdown" class="debt-alerts-dropdown">
            <div id="debtAlerts" class="debt-alerts"></div>
        </div>
    </div>

    <!-- Debt Summary --> <!-- Resumo das dívidas -->
    <div class="debt-overview-panel stagger-enter">
        <div class="debt-overview-card debt-ov-monthly" data-filter="monthly" role="button" tabindex="0">
            <div class="debt-ov-header">
                <div class="debt-ov-icon"><i class="fa-solid fa-rotate"></i></div>
                <div>
                    <p class="debt-ov-title">Mensais</p>
                    <p class="debt-ov-subtitle">Fixas + Únicas ativas</p>
                </div>
            </div>
            <p class="debt-ov-amount" id="totalDebts">R$ 0,00</p>
            <div class="debt-ov-footer">
                <span class="debt-ov-count" id="monthlyDebtCount">0 dívidas</span>
                <span class="debt-ov-badge badge-monthly">Mês atual</span>
            </div>
        </div>
        <div class="debt-overview-card debt-ov-financing" data-filter="financing" role="button" tabindex="0">
            <div class="debt-ov-header">
                <div class="debt-ov-icon"><i class="fa-solid fa-building-columns"></i></div>
                <div>
                    <p class="debt-ov-title">Financiamentos</p>
                    <p class="debt-ov-subtitle">Parcela mensal</p>
                </div>
            </div>
            <p class="debt-ov-amount" id="totalFinancing">R$ 0,00</p>
            <div class="debt-ov-footer">
                <span class="debt-ov-count" id="financingDebtCount">0 dívidas</span>
                <span class="debt-ov-remaining" id="financingRemaining">Restante: R$ 0,00</span>
            </div>
        </div>
        <div class="debt-overview-card debt-ov-loan" data-filter="loan" role="button" tabindex="0">
            <div class="debt-ov-header">
                <div class="debt-ov-icon"><i class="fa-solid fa-hand-holding-dollar"></i></div>
                <div>
                    <p class="debt-ov-title">Empréstimos</p>
                    <p class="debt-ov-subtitle">Parcela mensal</p>
                </div>
            </div>
            <p class="debt-ov-amount" id="totalLoans">R$ 0,00</p>
            <div class="debt-ov-footer">
                <span class="debt-ov-count" id="loanDebtCount">0 dívidas</span>
                <span class="debt-ov-remaining" id="loanRemaining">Restante: R$ 0,00</span>
            </div>
        </div>
    </div>
    <div class="debt-overview-panel" id="cardDebtCardsContainer">
        <!-- Cartões de dívida por membro - Populado dinamicamente por JS -->
    </div>
    <div class="debt-summary-strip stagger-enter">
        <div class="summary-mini" data-filter="all" role="button" tabindex="0">
            <div class="sm-icon active-sm-icon"><i class="fa-solid fa-hourglass-half"></i></div>
            <div class="sm-text">
                <p class="sm-label">Ativas</p>
                <p class="sm-value" id="activeDebts">0</p>
            </div>
        </div>
        <div class="summary-mini" data-filter="paid" role="button" tabindex="0">
            <div class="sm-icon paid-sm-icon"><i class="fa-solid fa-circle-check"></i></div>
            <div class="sm-text">
                <p class="sm-label">Total Pagas</p>
                <p class="sm-value" id="totalPaidDebtsTab">R$ 0,00</p>
            </div>
        </div>
    </div>

    <div id="debtFilterBar" class="debt-filter-bar">
        <span id="debtFilterLabel"><i class="fa-solid fa-filter"></i> Filtrando: —</span>
        <button class="debt-filter-clear" onclick="clearDebtFilter()"><i class="fa-solid fa-xmark"></i> Limpar</button>
    </div>

    <div id="debtsList" class="debts-list"></div>
</section>
